<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <title>Foreign Affairs - Sinowa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <header><h1>SINOWA.GOV.SN</h1></header>
        <div class="card">
            <h2>Foreign Affairs & Treaties</h2>
            <p>Submit formal communiqués below. Ensure all diplomatic protocols are met.</p>
            
            <form action="https://formspree.io/f/xwvygeae" method="POST">
                <div class="form-group">
                    <label>Sovereign Nation / Entity:</label>
                    <input type="text" name="Nation" required>
                </div>
                <div class="form-group">
                    <label>Requested Treaties:</label>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <label><input type="checkbox" name="Embassy"> Embassy Exchange</label>
                        <label><input type="checkbox" name="Defence"> Defence Pact</label>
                        <label><input type="checkbox" name="Trade"> Trade Agreement</label>
                        <label><input type="checkbox" name="CTA"> Common Travel Area</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Official Communiqué:</label>
                    <textarea name="Message" rows="6" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Transmit Proposal</button>
            </form>
        </div>
    </div>
</body>
</html>
